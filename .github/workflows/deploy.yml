###############################################################################
# deploy.yml - Continuous Deployment
#
# Manually triggered (workflow_dispatch). The deployer picks:
#   1. Which release tag to deploy
#   2. Which environment to deploy to (or check "Deploy All" for full chain)
#   3. A ServiceNow change ticket (required for production)
#
# IMPORTANT: This workflow has NO enforcement logic.
# The Custom Deployment Protection Rule (GitHub App) fires AUTOMATICALLY
# when this workflow targets a protected environment. The gate checks:
#   - Was this artifact deployed to the prior environment?
#   - Is the ServiceNow ticket valid? (for production)
#
# This is the whole point: teams write whatever workflow they want,
# and the gate handles enforcement at the environment level.
###############################################################################

name: Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g., v1.0.42)"
        required: true
        type: string
      environment:
        description: "Target environment (ignored if Deploy All is checked)"
        required: true
        type: choice
        options:
          - Dev
          - QA
          - Staging
          - Production-East
          - Production-Central
      deploy_all:
        description: "Deploy to ALL environments (Dev → QA → Staging → Prod-East → Prod-Central)"
        required: false
        type: boolean
        default: false
      change_ticket:
        description: "ServiceNow change ticket (required for Production, e.g., CHG0012345)"
        required: false
        type: string

env:
  APP_NAME: deployment-gate-app-demo

permissions: {}

run-name: "Deploy ${{ inputs.release_tag }} to ${{ inputs.deploy_all == 'true' && 'ALL' || inputs.environment }} ${{ inputs.change_ticket }}"

jobs:
  # ── Single environment deploy (when deploy_all is false) ──────────────
  deploy-single:
    if: inputs.deploy_all == false
    name: "Deploy ${{ inputs.release_tag }} to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Generate artifact hash
        id: hash
        run: |
          DIGEST="sha256:$(sha256sum app-build.zip | awk '{print $1}')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to ${{ inputs.environment }}..."
          unzip -q app-build.zip
          sleep 2
          echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ inputs.environment }}" in
            "Dev") LOGICAL_ENV="development" ;;
            "QA") LOGICAL_ENV="testing" ;;
            "Staging") LOGICAL_ENV="staging" ;;
            "Production-East"|"Production-Central") LOGICAL_ENV="production" ;;
            *) LOGICAL_ENV="${{ inputs.environment }}" ;;
          esac
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" \
            -f digest="${{ steps.hash.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" \
            -f status="deployed" \
            -f logical_environment="$LOGICAL_ENV" \
            -f deployment_name="${{ inputs.environment }}-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          && echo "Deployment record registered" \
          || echo "Deployment record registration failed (linked artifacts may not be enabled)"

  # ── Deploy All chain (Dev → QA → Staging → Prod-East → Prod-Central) ─
  deploy-dev:
    if: inputs.deploy_all == true
    name: "Deploy to Dev"
    runs-on: ubuntu-latest
    environment: Dev
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.hash.outputs.digest }}
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Generate artifact hash
        id: hash
        run: |
          DIGEST="sha256:$(sha256sum app-build.zip | awk '{print $1}')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to Dev..."
          unzip -q app-build.zip && sleep 2 && echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" -f digest="${{ steps.hash.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" -f status="deployed" \
            -f logical_environment="development" \
            -f deployment_name="Dev-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          || true

  deploy-qa:
    if: inputs.deploy_all == true
    needs: deploy-dev
    name: "Deploy to QA"
    runs-on: ubuntu-latest
    environment: QA
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to QA..."
          unzip -q app-build.zip && sleep 2 && echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" -f digest="${{ needs.deploy-dev.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" -f status="deployed" \
            -f logical_environment="testing" \
            -f deployment_name="QA-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          || true

  deploy-staging:
    if: inputs.deploy_all == true
    needs: [deploy-dev, deploy-qa]
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    environment: Staging
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to Staging..."
          unzip -q app-build.zip && sleep 2 && echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" -f digest="${{ needs.deploy-dev.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" -f status="deployed" \
            -f logical_environment="staging" \
            -f deployment_name="Staging-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          || true

  deploy-prod-east:
    if: inputs.deploy_all == true
    needs: [deploy-dev, deploy-staging]
    name: "Deploy to Production-East"
    runs-on: ubuntu-latest
    environment: Production-East
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to Production-East..."
          unzip -q app-build.zip && sleep 2 && echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" -f digest="${{ needs.deploy-dev.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" -f status="deployed" \
            -f logical_environment="production" \
            -f deployment_name="Production-East-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          || true

  deploy-prod-central:
    if: inputs.deploy_all == true
    needs: [deploy-dev, deploy-staging]
    name: "Deploy to Production-Central"
    runs-on: ubuntu-latest
    environment: Production-Central
    permissions:
      contents: read
      deployments: write
      artifact-metadata: write
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "app-build.zip" --dir .

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.release_tag }} to Production-Central..."
          unzip -q app-build.zip && sleep 2 && echo "Done!"

      - name: Register deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" -f digest="${{ needs.deploy-dev.outputs.digest }}" \
            -f version="${{ inputs.release_tag }}" -f status="deployed" \
            -f logical_environment="production" \
            -f deployment_name="Production-Central-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.event.repository.name }}" \
          || true
